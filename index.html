<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта философии искусств</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="controls">
        <span style="color: #aaa;">🖱️ Тяни карту, чтобы перемещаться. Кликай на круги.</span>
    </div>

    <!-- ГЛАВНЫЙ КОНТЕЙНЕР ДЛЯ КАРТЫ -->
    <div id="graph-container">
        <svg id="graph-svg"></svg>
    </div>

    <!-- БОКОВАЯ ПАНЕЛЬ С ИНФОРМАЦИЕЙ (изначально скрыта) -->
    <div id="info-panel" style="display: none;">
        <button id="close-panel">✕</button>
        <div id="panel-content">
            <h2 id="panel-title">Название</h2>
            <p id="panel-line" style="font-weight: bold;"></p>
            <p id="panel-desc">Описание появится здесь</p>
            <div id="panel-image"></div>
        </div>
    </div>

    <!-- Библиотека D3.js и наш скрипт -->
    <script src="d3.v7.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
